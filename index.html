<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiação.Net - A web rádio de todas as tribos!</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jd7JYYbX/Logo-Nova-Cor-200.png">
    <style>
      /* Importando uma fonte moderna do Google */
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
      /* Reset básico para garantir consistência */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #121212;
        color: #ffffff;
        line-height: 1.6;
        background-image: url('https://painel.radiacao.net.br/static/uploads/radiacaonet/background.1779332336.webp');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        /* --- Início das modificações para centralizar --- */
        min-height: 100vh; /* Garante altura total do navegador para alinhar verticalmente */
        display: flex;      /* Inicia o Flexbox */
        justify-content: center; /* Centraliza horizontalmente */
        align-items: center;     /* Centraliza verticalmente */
        /* --- Fim das modificações para centralizar --- */
      }
      /* Container do Player */
      .player-container {
        width: 100%;       /* Garante que ocupe a largura até o max-width */
        max-width: 600px; /* Largura máxima desejada */
        background-color: #1e1e1e;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 10;
        /* margin: auto;  <-- Esta linha não é mais necessária com Flexbox */
      }
    </style>
  </head>
  <body>
    <div class="player-container">
			<h2 style="margin-top:-5px;">Radiação.Net</h2>
      <iframe src="https://painel.radiacao.net.br/public/radiacaonet/embed?theme=dark&autoplay=1&volume=100&rounded=1&continuous=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height:100px; height: 100px; border: 0;"></iframe>
    </div>
  </body>
</html>
