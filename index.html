<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiação.Net - A web rádio de todas as tribos!</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jd7JYYbX/Logo-Nova-Cor-200.png">
    <style>
      /* Importando uma fonte moderna do Google */
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
      
      /* Reset básico para garantir consistência */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #121212;
        color: #ffffff;
        line-height: 1.6;
        background-image: url('https://painel.radiacao.net.br/static/uploads/radiacaonet/background.1779332336.webp');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        min-height: 100vh;
        
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        padding: 20px;
        gap: 20px; /* Reduzi sutilmente para os elementos não ficarem muito distantes */
      }
      
      /* --- Estilos do Título Flutuante --- */
      .floating-title {
        font-size: 2.2rem;
        font-weight: 900; /* Peso máximo da fonte Montserrat para dar destaque */
        text-align: center;
        /* A mágica da flutuação no texto acontece aqui com as sombras */
        text-shadow: 0 8px 20px rgba(0, 0, 0, 0.8), 0 2px 5px rgba(0, 0, 0, 0.5);
        z-index: 10;
        margin-bottom: -5px; /* Puxa o player levemente para perto do título */
      }

      /* Container do Player */
      .player-container {
        width: 100%;
        max-width: 600px;
        background-color: #1e1e1e;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 10;
      }

      /* --- Estilos dos Botões Flutuantes --- */
      .apps-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        width: 100%;
        z-index: 10;
      }

      .app-card {
        text-decoration: none;
        display: flex;
        transition: transform 0.3s ease, filter 0.3s ease;
      }

      /* Efeito de flutuação ao passar o mouse */
      .app-card:hover {
        transform: translateY(-6px); 
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6)); 
      }

      .app-card img {
        height: 60px;
        width: auto;
        display: block;
      }

      /* Responsividade */
      @media (max-width: 400px) {
        .apps-container {
          flex-direction: column;
        }
        .floating-title {
          font-size: 1.8rem; /* Reduz o tamanho da fonte em celulares muito pequenos */
        }
      }
    </style>
  </head>
  <body>
    
    <h1 class="floating-title">Radiação.Net</h1>

    <div class="player-container">
      <iframe src="https://painel.radiacao.net.br/public/radiacaonet/embed?theme=dark&volume=100&rounded=1&continuous=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height:100px; height: 110px; border: 0;"></iframe>
    </div>

    <div class="apps-container">
      <a href="https://play.google.com/store/apps/details?id=br.com.radios.radiosmobile.radiosnet" target="_blank" rel="noopener noreferrer" class="app-card" title="Baixar RadiosNet no Google Play">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Disponível no Google Play">
      </a>
      
      <a href="https://apps.apple.com/br/app/radiosnet/id1089302078" target="_blank" rel="noopener noreferrer" class="app-card" title="Baixar RadiosNet na App Store">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="Baixar na App Store">
      </a>
    </div>

  </body>
</html>
