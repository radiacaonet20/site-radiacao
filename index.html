<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiação.Net - A web rádio de todas as tribos!</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jd7JYYbX/Logo-Nova-Cor-200.png">
    <style>
      /* Importando uma fonte moderna do Google */
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
      /* Reset básico para garantir consistência */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #121212;
        color: #ffffff;
        line-height: 1.6;
        background-image: url('https://painel.radiacao.net.br/static/uploads/radiacaonet/background.1779332336.webp');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      /* Container do Player */
      .player-container {
        width: 100%;
        max-width: 600px;
        background-color: #1e1e1e;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 10;
      }
      /* --- Estilos dos Cards de Aplicativos --- */
      .apps-container {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        width: 100%;
      }
      .app-card {
        flex: 1;
        background-color: #2a2a2a;
        text-decoration: none;
        padding: 10px; /* Ajustado para dar espaço à imagem */
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.2s ease, background-color 0.2s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .app-card:hover {
        transform: translateY(-3px);
        background-color: #333333;
      }

      /* Estilização da imagem genérica dentro do card */
      .app-card img {
        height: 50px; /* Tamanho controlado da imagem genérica */
        width: auto;
        display: block;
        border-radius: 50%; /* Mantém a imagem redonda */
      }

      .app-card.android {
        border-bottom: 3px solid #3DDC84;
      }

      .app-card.ios {
        border-bottom: 3px solid #007AFF;
      }

      /* Responsividade */
      @media (max-width: 400px) {
        .apps-container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="player-container">
      <h2 style="margin-top:-5px; margin-bottom: 15px; text-align: center;">Radiação.Net</h2>
      
      <iframe src="https://painel.radiacao.net.br/public/radiacaonet/embed?theme=dark&volume=100&rounded=1&continuous=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height:100px; height: 100px; border: 0;"></iframe>
      
      <div class="apps-container">
        <a href="https://play.google.com/store/apps/details?id=br.com.radios.radiosmobile.radiosnet" target="_blank" rel="noopener noreferrer" class="app-card android" style="padding: 0; background: transparent; box-shadow: none;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Disponível no Google Play" style="height: 60px; width: auto; border-radius: 0;">
        </a>
        <a href="https://play.google.com/store/apps/details?id=br.com.radios.radiosmobile.radiosnet" target="_blank" rel="noopener noreferrer" class="app-card ios" style="padding: 0; background: transparent; box-shadow: none;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="Baixar na App Store" style="height: 60px; width: auto; border-radius: 0;">
        </a>
      </div>
    </div>
  </body>
</html>
